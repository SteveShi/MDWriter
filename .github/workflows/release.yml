name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    name: Build Universal App
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Extract Version from Changelog
        id: get_version
        run: |
          # 使用 grep -F (Fixed Strings) 匹配，绝对不会出现正则转义问题
          VERSION_LINE=$(grep -F "## [" CHANGELOG.md | head -n 1)
          if [ -z "$VERSION_LINE" ]; then
            echo "Error: Could not find version line in CHANGELOG.md"
            exit 1
          fi
          # 使用 cut 分割：## [1.9.9] -> 1.9.9] -> 1.9.9
          VERSION=$(echo "$VERSION_LINE" | cut -d'[' -f2 | cut -d']' -f1)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION_TAG=v$VERSION" >> $GITHUB_ENV
          echo "Detected Version: $VERSION"

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'
          
      - name: Resolve Swift Packages
        run: |
          # 显式创建目录并尝试解析依赖
          mkdir -p build
          xcodebuild -resolvePackageDependencies -project MDWriter.xcodeproj -scheme MDWriter -derivedDataPath build
          
      - name: Patch xcstrings-tool retroactive attribute
        run: |
          # 修复 Swift 6 编译错误
          file=$(find . -name "AccessLevel+Resolution.swift" | grep "xcstrings-tool" | head -n 1)
          if [ -n "$file" ] && [ -f "$file" ]; then
            perl -pi -e 's/\@retroactive\s+//g' "$file"
            if ! grep -q "^import ArgumentParser" "$file"; then
              sed -i '' '1s;^;import ArgumentParser\n;' "$file"
            fi
          fi

      - name: Build Universal Binary
        run: |
          VERSION_CLEAN=${{ env.VERSION }}
          xcodebuild -scheme MDWriter \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath build \
            MARKETING_VERSION=$VERSION_CLEAN \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package App (ZIP and DMG)
        run: |
          rm -rf dmg_root deploy
          APP_PATH=$(find build/Build/Products/Release -name "MDWriter.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "CRITICAL ERROR: MDWriter.app not found!"
            exit 1
          fi
          APP_NAME=$(basename "$APP_PATH")
          APP_DIR=$(dirname "$APP_PATH")
          VERSION_CLEAN=${{ env.VERSION }}
          ZIP_NAME="MDWriter-${VERSION_CLEAN}-Universal.zip"
          DMG_NAME="MDWriter-${VERSION_CLEAN}-Universal.dmg"
          
          cd "$APP_DIR"
          zip -r "$GITHUB_WORKSPACE/$ZIP_NAME" "$APP_NAME"
          cd -
          
          mkdir -p dmg_root
          cp -R "$APP_PATH" dmg_root/
          hdiutil create -volname "MDWriter" -srcfolder dmg_root -ov -format UDZO "$DMG_NAME"
          
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          echo "DMG_NAME=$DMG_NAME" >> $GITHUB_ENV

      - name: Setup Sparkle
        uses: jozefizso/setup-sparkle@v1
        with:
          version: 2.8.1

      - name: Generate Sparkle Appcast
        env:
          SUPrivateEDKey: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          if [ -z "$SUPrivateEDKey" ]; then
            echo "ERROR: SPARKLE_PRIVATE_KEY secret is missing!"
            exit 1
          fi

          mkdir -p deploy
          cp "${{ env.ZIP_NAME }}" deploy/
          
          echo "Running generate_appcast..."
          # 严格遵守文档：直接调用 generate_appcast
          generate_appcast --download-url-prefix "https://github.com/lpgneg19/MDWriter/releases/download/${{ env.VERSION_TAG }}/" deploy/
          
          if [ -f "deploy/appcast.xml" ]; then
            mv deploy/appcast.xml .
            echo "Appcast generated successfully."
          else
            echo "ERROR: generate_appcast failed."
            exit 1
          fi

      - name: Extract Release Notes
        run: |
          VERSION_CLEAN=${{ env.VERSION }}
          # 提取日志，如果没有找到，则生成一个基础日志以免发布中断
          awk "/^## \[$VERSION_CLEAN\]/{flag=1;next} /^## \[/{flag=0} flag" CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "Release for version $VERSION_CLEAN. Check CHANGELOG.md for details." > release_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ZIP_NAME }}
            ${{ env.DMG_NAME }}
            appcast.xml
          name: Release ${{ env.VERSION_TAG }}
          tag_name: ${{ env.VERSION_TAG }}
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}