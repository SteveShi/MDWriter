name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    name: Build Universal App
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Extract Version from Changelog
        id: get_version
        run: |
          # 使用 awk 字段分隔符提取版本号，这是跨平台最稳健的方案
          VERSION=$(awk -F'[][]' '/^## \[ / {print $2; exit}' CHANGELOG.md)
          if [ -z "$VERSION" ]; then
            echo "Error: Could not find version in CHANGELOG.md"
            cat CHANGELOG.md | head -n 20
            exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION_TAG=v$VERSION" >> $GITHUB_ENV
          echo "Detected Version: $VERSION"

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'
          
      - name: Resolve Swift Packages
        run: |
          # 显式创建目录并尝试解析依赖
          mkdir -p build
          xcodebuild -resolvePackageDependencies -project MDWriter.xcodeproj -scheme MDWriter -derivedDataPath build
          
      - name: Patch xcstrings-tool retroactive attribute
        run: |
          # 修复 Swift 6 编译错误
          file=$(find . -name "AccessLevel+Resolution.swift" | grep "xcstrings-tool" | head -n 1)
          if [ -n "$file" ] && [ -f "$file" ]; then
            perl -pi -e 's/\@retroactive\s+//g' "$file"
            if ! grep -q "^import ArgumentParser" "$file"; then
              sed -i '' '1s;^;import ArgumentParser\n;' "$file"
            fi
          fi

      - name: Build Universal Binary
        run: |
          VERSION_CLEAN=${{ env.VERSION }}
          xcodebuild -scheme MDWriter \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath build \
            MARKETING_VERSION=$VERSION_CLEAN \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package App (ZIP and DMG)
        run: |
          rm -rf dmg_root deploy
          APP_PATH=$(find build/Build/Products/Release -name "MDWriter.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "CRITICAL ERROR: MDWriter.app not found!"
            exit 1
          fi
          APP_NAME=$(basename "$APP_PATH")
          APP_DIR=$(dirname "$APP_PATH")
          VERSION_CLEAN=${{ env.VERSION }}
          ZIP_NAME="MDWriter-${VERSION_CLEAN}-Universal.zip"
          DMG_NAME="MDWriter-${VERSION_CLEAN}-Universal.dmg"
          
          cd "$APP_DIR"
          zip -r "$GITHUB_WORKSPACE/$ZIP_NAME" "$APP_NAME"
          cd -
          
          mkdir -p dmg_root
          cp -R "$APP_PATH" dmg_root/
          hdiutil create -volname "MDWriter" -srcfolder dmg_root -ov -format UDZO "$DMG_NAME"
          
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          echo "DMG_NAME=$DMG_NAME" >> $GITHUB_ENV

      - name: Generate Sparkle Appcast
        env:
          MY_RAW_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          # 1. 下载并解压官方 Sparkle
          curl -L -O https://github.com/sparkle-project/Sparkle/releases/download/2.8.1/Sparkle-2.8.1.tar.xz
          tar -xf Sparkle-2.8.1.tar.xz

          # 2. 准备签名环境
          if [ -z "$MY_RAW_KEY" ]; then
            echo "ERROR: SPARKLE_PRIVATE_KEY secret is missing!"
            exit 1
          fi
          
          # 清理私钥
          CLEAN_KEY=$(echo "$MY_RAW_KEY" | tr -d '[:space:]' | sed 's/^EdDSAPrivateKey://')
          export SUPrivateEDKey="$CLEAN_KEY"
          
          # 3. 准备发布目录
          mkdir -p deploy
          cp "${{ env.ZIP_NAME }}" deploy/
          
          # 4. 执行签名并生成 Appcast
          export DYLD_FRAMEWORK_PATH="$PWD"
          
          echo "Running generate_appcast..."
          # 在同一行显式定义变量，确保子进程能识别
          SUPrivateEDKey="$CLEAN_KEY" ./bin/generate_appcast \
            --download-url-prefix "https://github.com/lpgneg19/MDWriter/releases/download/${{ env.VERSION_TAG }}/" \
            deploy/
          
          if [ -f "deploy/appcast.xml" ]; then
            mv deploy/appcast.xml .
            echo "Appcast generated successfully."
          else
            echo "ERROR: generate_appcast failed to produce appcast.xml."
            exit 1
          fi

      - name: Extract Release Notes
        run: |
          VERSION_CLEAN=${{ env.VERSION }}
          # 提取两个版本号之间的更新日志
          awk -v ver="[$VERSION_CLEAN]" ' \
            $0 ~ "## " ver {flag=1; next} \
            /^## \[ / {flag=0} \
            flag {print} \
          ' CHANGELOG.md > release_notes.md
          
          if [ ! -s release_notes.md ]; then
            echo "Release for version $VERSION_CLEAN." > release_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ZIP_NAME }}
            ${{ env.DMG_NAME }}
            appcast.xml
          name: Release ${{ env.VERSION_TAG }}
          tag_name: ${{ env.VERSION_TAG }}
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
