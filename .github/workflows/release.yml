name: Build and Release

on:
  push:
    tags:
      - 'v*' # 当推送以 v 开头的标签时触发，例如 v1.1

jobs:
  build:
    name: Build Universal App
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'
          
      - name: Resolve Swift Packages
        run: |
          # 显式创建目录并尝试解析依赖
          mkdir -p build
          xcodebuild -resolvePackageDependencies -project MDWriter.xcodeproj -scheme MDWriter -derivedDataPath build
          
      - name: Patch xcstrings-tool retroactive attribute
        run: |
          # 在整个工作区搜索文件，因为路径可能因 Xcode 版本或配置而异
          echo "Searching for AccessLevel+Resolution.swift..."
          file=$(find . -name "AccessLevel+Resolution.swift" | grep "xcstrings-tool" | head -n 1)
          
          if [ -n "$file" ] && [ -f "$file" ]; then
            echo "Found file at: $file"
            # 移除导致 Swift 6 编译错误的 @retroactive 属性
            perl -pi -e 's/\@retroactive\s+//g' "$file"
            # 确保导入了 ArgumentParser
            if ! grep -q "^import ArgumentParser" "$file"; then
              sed -i '' '1s;^;import ArgumentParser\n;' "$file"
            fi
            echo "Successfully patched $file"
          else
            echo "Error: AccessLevel+Resolution.swift not found."
            echo "Current directory structure:"
            ls -R | grep ":$" | sed -e 's/:$//' -e 's/[^-][^\/]*\//--/g' -e 's/^/  /' | head -n 50
            exit 1
          fi

      - name: Build Universal Binary
        run: |
          VERSION=${{ github.ref_name }}
          VERSION_CLEAN=${VERSION#v}
          
          echo "Building version $VERSION_CLEAN (Build ${{ github.run_number }})"
          
          xcodebuild -scheme MDWriter \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath build \
            MARKETING_VERSION=$VERSION_CLEAN \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package App (ZIP and DMG)
        run: |
          # 找到编译好的 .app 文件
          APP_PATH=$(find build/Build/Products/Release -name "*.app" -type d | head -n 1)
          APP_NAME=$(basename "$APP_PATH")
          APP_DIR=$(dirname "$APP_PATH")
          
          VERSION_CLEAN=${{ github.ref_name }}
          VERSION_CLEAN=${VERSION_CLEAN#v}
          
          ZIP_NAME="MDWriter-${VERSION_CLEAN}-Universal.zip"
          DMG_NAME="MDWriter-${VERSION_CLEAN}-Universal.dmg"
          
          # 打包 ZIP
          cd "$APP_DIR"
          zip -r "$GITHUB_WORKSPACE/$ZIP_NAME" "$APP_NAME"
          cd -
          
          # 打包 DMG
          mkdir -p dmg_root
          cp -R "$APP_PATH" dmg_root/
          hdiutil create -volname "MDWriter" -srcfolder dmg_root -ov -format UDZO "$DMG_NAME"
          
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          echo "DMG_NAME=$DMG_NAME" >> $GITHUB_ENV

      - name: Generate Sparkle Appcast
        run: |
          # 下载并解压 Sparkle 工具
          curl -L -o sparkle.tar.xz https://github.com/sparkle-project/Sparkle/releases/download/2.8.1/Sparkle-2.8.1.tar.xz
          mkdir -p sparkle_bin
          tar -xf sparkle.tar.xz -C sparkle_bin
          
          # 确保二进制文件具有执行权限
          chmod +x ./sparkle_bin/bin/generate_appcast
          
          # 准备发布目录
          mkdir -p deploy
          cp "${{ env.ZIP_NAME }}" deploy/
          
          # 使用私钥签名并生成 appcast.xml
          export SUPrivateEDKey="${{ secrets.SPARKLE_PRIVATE_KEY }}"
          
          # 使用 Sparkle 2.x 标准命令生成 appcast
          # 注意：generate_appcast 会自动寻找同级目录下的 Sparkle.framework
          ./sparkle_bin/bin/generate_appcast --download-url-prefix "https://github.com/lpgneg19/MDWriter/releases/download/${{ github.ref_name }}/" deploy/
          
          # 检查生成是否成功
          if [ -f "deploy/appcast.xml" ]; then
            mv deploy/appcast.xml .
            echo "Successfully generated appcast.xml"
          else
            echo "Error: appcast.xml was not generated."
            exit 1
          fi

      - name: Extract Release Notes
        run: |
          VERSION=${{ github.ref_name }}
          VERSION_CLEAN=${VERSION#v}
          awk "/^## \[$VERSION_CLEAN\]/{flag=1;next} /^## \[/{flag=0} flag" CHANGELOG.md > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ZIP_NAME }}
            ${{ env.DMG_NAME }}
            appcast.xml
          name: Release ${{ github.ref_name }}
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
