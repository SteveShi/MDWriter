name: Build and Release

on:
  push:
    tags:
      - 'v*' # 当推送以 v 开头的标签时触发，例如 v1.1

jobs:
  build:
    name: Build Universal App
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Build Universal Binary
        run: |
          xcodebuild -scheme MDWriter \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath build \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package App
        run: |
          # 找到编译好的 .app 文件
          APP_PATH=$(find build/Build/Products/Release -name "*.app" -type d | head -n 1)
          APP_NAME=$(basename "$APP_PATH")
          ZIP_NAME="MDWriter-Universal.zip"
          
          # 进入目录打包
          cd "$(dirname "$APP_PATH")"
          zip -r "../../../$ZIP_NAME" "$APP_NAME"
          
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          echo "ZIP_PATH=./$ZIP_NAME" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
