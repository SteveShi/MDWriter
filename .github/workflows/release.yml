name: Build and Release

on:
  push:
    branches:
      - main
    paths:
      - 'CHANGELOG.md'
  workflow_dispatch: # 允许手动触发

jobs:
  inspect:
    name: Inspect Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}
      version_tag: ${{ steps.get_version.outputs.VERSION_TAG }}
      skipped: ${{ steps.check_version.outputs.skipped }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Extract Version from Changelog
        id: get_version
        run: |
          # 提取版本号逻辑（保持您确认工作的版本）
          VERSION=$(sed -n '/## \[/p' CHANGELOG.md | head -n 1 | cut -d'[' -f2 | cut -d']' -f1)
          if [ -z "$VERSION" ]; then
            echo "Error: Could not extract version from CHANGELOG.md"
            exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION_TAG=v$VERSION" >> $GITHUB_OUTPUT
          echo "Detected Version: $VERSION"

      - name: Check If Version Already Released
        id: check_version
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.get_version.outputs.VERSION }}"
          if gh release view "$TAG" >/dev/null 2>&1 && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "Version $TAG already exists. Skipping release."
            echo "skipped=true" >> $GITHUB_OUTPUT
          else
            echo "skipped=false" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build and Release
    needs: inspect
    if: needs.inspect.outputs.skipped != 'true'
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare Environment
        run: |
          echo "VERSION=${{ needs.inspect.outputs.version }}" >> $GITHUB_ENV
          echo "VERSION_TAG=${{ needs.inspect.outputs.version_tag }}" >> $GITHUB_ENV

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Install XcodeGen
        run: |
          brew install xcodegen

      - name: Generate Xcode Project
        run: |
          xcodegen --version
          xcodegen generate --spec project.yml
          
      - name: Resolve Swift Packages
        run: |
          mkdir -p build
          xcodebuild -resolvePackageDependencies -project MDWriter.xcodeproj -scheme MDWriter -derivedDataPath build
          

      - name: Build Universal Binary
        run: |
          VERSION_CLEAN=${{ env.VERSION }}
          xcodebuild -scheme MDWriter \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath build \
            MARKETING_VERSION=$VERSION_CLEAN \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Verify App Bundle Version Keys
        run: |
          APP_PATH=$(find build/Build/Products/Release -name "MDWriter.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "CRITICAL ERROR: MDWriter.app not found!"
            exit 1
          fi
          INFO_PLIST="$APP_PATH/Contents/Info.plist"
          if [ ! -f "$INFO_PLIST" ]; then
            echo "CRITICAL ERROR: Info.plist not found at $INFO_PLIST"
            exit 1
          fi
          SHORT_VERSION=$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" "$INFO_PLIST" 2>/dev/null || true)
          BUNDLE_VERSION=$(/usr/libexec/PlistBuddy -c "Print CFBundleVersion" "$INFO_PLIST" 2>/dev/null || true)
          if [ -z "$SHORT_VERSION" ] || [ -z "$BUNDLE_VERSION" ]; then
            echo "CRITICAL ERROR: Missing CFBundleShortVersionString or CFBundleVersion in Info.plist"
            echo "CFBundleShortVersionString='$SHORT_VERSION'"
            echo "CFBundleVersion='$BUNDLE_VERSION'"
            exit 1
          fi
          echo "Info.plist versions OK: CFBundleShortVersionString=$SHORT_VERSION, CFBundleVersion=$BUNDLE_VERSION"

      - name: Package App (ZIP and DMG)
        run: |
          rm -rf dmg_root deploy
          APP_PATH=$(find build/Build/Products/Release -name "MDWriter.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "CRITICAL ERROR: MDWriter.app not found!"
            exit 1
          fi
          APP_NAME=$(basename "$APP_PATH")
          APP_DIR=$(dirname "$APP_PATH")
          VERSION_CLEAN=${{ env.VERSION }}
          ZIP_NAME="MDWriter-${VERSION_CLEAN}-Universal.zip"
          DMG_NAME="MDWriter-${VERSION_CLEAN}-Universal.dmg"
          
          cd "$APP_DIR"
          zip -r "$GITHUB_WORKSPACE/$ZIP_NAME" "$APP_NAME"
          cd -
          
          mkdir -p dmg_root
          cp -R "$APP_PATH" dmg_root/
          hdiutil create -volname "MDWriter" -srcfolder dmg_root -ov -format UDZO "$DMG_NAME"
          
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          echo "DMG_NAME=$DMG_NAME" >> $GITHUB_ENV

      - name: Generate Sparkle Appcast
        env:
          SPARKLE_SECRET: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          # 1. 下载并解压 Sparkle 工具
          curl -L -O https://github.com/sparkle-project/Sparkle/releases/download/2.8.1/Sparkle-2.8.1.tar.xz
          tar -xf Sparkle-2.8.1.tar.xz

          # 2. 极致清理私钥 (确保没有任何不可见字符)
          CLEAN_KEY=$(echo "$SPARKLE_SECRET" | sed 's/EdDSAPrivateKey://' | tr -dc 'A-Za-z0-9+/=')
          
          if [ -z "$CLEAN_KEY" ]; then
            echo "ERROR: SPARKLE_PRIVATE_KEY secret is missing!"
            exit 1
          fi

          # 3. 准备发布目录
          mkdir -p deploy
          cp "${{ env.ZIP_NAME }}" deploy/
          
          # 4. 执行签名并生成 Appcast
          # 设置动态库路径以确保 bin/generate_appcast 能找到 Sparkle.framework
          export DYLD_FRAMEWORK_PATH="$PWD"
          
          echo "Running generate_appcast using stdin method (Issue 2670 recommendation)..."
          # 使用 --ed-key-file - 从标准输入读取私钥，这是在 CI 中绕过 Keychain 的最可靠方式
          echo "$CLEAN_KEY" | ./bin/generate_appcast \
            --ed-key-file - \
            --download-url-prefix "https://github.com/lpgneg19/MDWriter/releases/download/${{ env.VERSION_TAG }}/" \
            deploy/
          
          if [ -f "deploy/appcast.xml" ]; then
            mv deploy/appcast.xml .
            echo "Appcast generated successfully."
          else
            echo "ERROR: generate_appcast failed to produce appcast.xml."
            exit 1
          fi

      - name: Validate Appcast Contents
        run: |
          if [ ! -f "appcast.xml" ]; then
            echo "CRITICAL ERROR: appcast.xml missing"
            exit 1
          fi
          if ! grep -q "<item" appcast.xml; then
            echo "CRITICAL ERROR: appcast.xml missing <item>"
            exit 1
          fi
          if ! grep -q "<enclosure" appcast.xml; then
            echo "CRITICAL ERROR: appcast.xml missing <enclosure>"
            exit 1
          fi
          if ! grep -q "sparkle:version" appcast.xml; then
            echo "CRITICAL ERROR: appcast.xml missing sparkle:version"
            exit 1
          fi
          if ! grep -q "sparkle:shortVersionString" appcast.xml; then
            echo "CRITICAL ERROR: appcast.xml missing sparkle:shortVersionString"
            exit 1
          fi
          echo "Appcast validation passed."

      - name: Extract Release Notes
        run: |
          VERSION_CLEAN=${{ env.VERSION }}
          # 提取日志逻辑（保持您确认工作的版本）
          awk "/^## \[$VERSION_CLEAN\]/{flag=1;next} /^## \[/{flag=0} flag" CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "Release for version $VERSION_CLEAN. Check CHANGELOG.md for details." > release_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ZIP_NAME }}
            ${{ env.DMG_NAME }}
            appcast.xml
          name: Release ${{ env.VERSION_TAG }}
          tag_name: ${{ env.VERSION_TAG }}
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
