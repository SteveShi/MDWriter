name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    name: Build Universal App
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Extract Version from Changelog
        id: get_version
        run: |
          # 提取最新的版本号 (匹配 ## [x.y.z] 格式)
          VERSION=$(grep -m 1 "## [" CHANGELOG.md | sed -E 's/.*[^\]\[([^\]]+)\].*/\1/')
          if [ -z "$VERSION" ]; then
            echo "Error: Could not extract version from CHANGELOG.md"
            cat CHANGELOG.md | head -n 20
            exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION_TAG=v$VERSION" >> $GITHUB_ENV
          echo "Detected Version: $VERSION"

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'
          
      - name: Resolve Swift Packages
        run: |
          # 显式创建目录并尝试解析依赖
          mkdir -p build
          xcodebuild -resolvePackageDependencies -project MDWriter.xcodeproj -scheme MDWriter -derivedDataPath build
          
      - name: Patch xcstrings-tool retroactive attribute
        run: |
          # 修复 Swift 6 编译错误
          file=$(find . -name "AccessLevel+Resolution.swift" | grep "xcstrings-tool" | head -n 1)
          if [ -n "$file" ] && [ -f "$file" ]; then
            perl -pi -e 's/\@retroactive\s+//g' "$file"
            if ! grep -q "^import ArgumentParser" "$file"; then
              sed -i '' '1s;^;import ArgumentParser\n;' "$file"
            fi

      - name: Build Universal Binary
        run: |
          VERSION_CLEAN=${{ env.VERSION }}
          xcodebuild -scheme MDWriter \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath build \
            MARKETING_VERSION=$VERSION_CLEAN \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package App (ZIP and DMG)
        run: |
          rm -rf dmg_root deploy
          APP_PATH=$(find build/Build/Products/Release -name "MDWriter.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "CRITICAL ERROR: MDWriter.app not found!"
            exit 1
          fi
          APP_NAME=$(basename "$APP_PATH")
          APP_DIR=$(dirname "$APP_PATH")
          VERSION_CLEAN=${{ env.VERSION }}
          ZIP_NAME="MDWriter-${VERSION_CLEAN}-Universal.zip"
          DMG_NAME="MDWriter-${VERSION_CLEAN}-Universal.dmg"
          
          cd "$APP_DIR"
          zip -r "$GITHUB_WORKSPACE/$ZIP_NAME" "$APP_NAME"
          cd -
          
          mkdir -p dmg_root
          cp -R "$APP_PATH" dmg_root/
          hdiutil create -volname "MDWriter" -srcfolder dmg_root -ov -format UDZO "$DMG_NAME"
          
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          echo "DMG_NAME=$DMG_NAME" >> $GITHUB_ENV

      - name: Generate Sparkle Appcast
        env:
          SUPrivateEDKey: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          # 1. 下载并解压 Sparkle 工具
          curl -L -o sparkle.tar.xz https://github.com/sparkle-project/Sparkle/releases/download/2.8.1/Sparkle-2.8.1.tar.xz
          mkdir -p sparkle_tools
          tar -xf sparkle.tar.xz -C sparkle_tools

          # 2. 定位工具和框架路径 (Sparkle 2.x 目录结构)
          GENERATE_APPCAST=$(find sparkle_tools -name generate_appcast -type f | head -n 1)
          FRAMEWORK_DIR=$(find sparkle_tools -name Sparkle.framework -type d -maxdepth 2 | xargs dirname | head -n 1)
          
          if [ -z "$GENERATE_APPCAST" ] || [ -z "$FRAMEWORK_DIR" ]; then
            echo "ERROR: Could not find Sparkle tools or framework."
            exit 1
          fi

          # 3. 准备签名环境
          if [ -z "$SUPrivateEDKey" ]; then
            echo "ERROR: SPARKLE_PRIVATE_KEY secret is missing!"
            exit 1
          fi
          
          # 清理私钥 (移除可能的前缀和空格)
          CLEAN_KEY=$(echo "$SUPrivateEDKey" | tr -d '[:space:]' | sed 's/^EdDSAPrivateKey://')
          export SUPrivateEDKey="$CLEAN_KEY"
          
          # 4. 准备发布目录
          mkdir -p deploy
          cp "${{ env.ZIP_NAME }}" deploy/
          
          # 5. 执行签名并生成 Appcast
          export DYLD_FRAMEWORK_PATH="$FRAMEWORK_DIR:$DYLD_FRAMEWORK_PATH"
          
          echo "Running generate_appcast..."
          SUPrivateEDKey="$CLEAN_KEY" "$GENERATE_APPCAST" \
            --download-url-prefix "https://github.com/lpgneg19/MDWriter/releases/download/${{ env.VERSION_TAG }}/" \
            deploy/
          
          if [ -f "deploy/appcast.xml" ]; then
            mv deploy/appcast.xml .
            echo "Appcast generated successfully."
          else
            echo "ERROR: generate_appcast failed."
            exit 1
          fi

      - name: Extract Release Notes
        run: |
          VERSION_CLEAN=${{ env.VERSION }}
          awk "/^## \[$VERSION_CLEAN\]/{flag=1;next} /^## [^\ Indian]/{flag=0} flag" CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "Release for version $VERSION_CLEAN." > release_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ZIP_NAME }}
            ${{ env.DMG_NAME }}
            appcast.xml
          name: Release ${{ env.VERSION_TAG }}
          tag_name: ${{ env.VERSION_TAG }}
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
