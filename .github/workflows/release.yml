name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    name: Build Universal App
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Extract Version from Changelog
        id: get_version
        run: |
          # 从 CHANGELOG.md 中提取最新的版本号 (例如 [1.9.9])
          VERSION=$(grep -m 1 -oE '^\[[0-9]+\.[0-9]+\.[0-9]+\]' CHANGELOG.md | tr -d '[]')
          if [ -z "$VERSION" ]; then
            echo "Error: Could not extract version from CHANGELOG.md"
            exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION_TAG=v$VERSION" >> $GITHUB_ENV
          echo "Detected Version: $VERSION"

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'
          
      - name: Resolve Swift Packages
        run: |
          # 显式创建目录并尝试解析依赖
          mkdir -p build
          xcodebuild -resolvePackageDependencies -project MDWriter.xcodeproj -scheme MDWriter -derivedDataPath build
          
      - name: Patch xcstrings-tool retroactive attribute
        run: |
          # 在整个工作区搜索文件，因为路径可能因 Xcode 版本或配置而异
          echo "Searching for AccessLevel+Resolution.swift..."
          file=$(find . -name "AccessLevel+Resolution.swift" | grep "xcstrings-tool" | head -n 1)
          
          if [ -n "$file" ] && [ -f "$file" ]; then
            echo "Found file at: $file"
            # 移除导致 Swift 6 编译错误的 @retroactive 属性
            perl -pi -e 's/\@retroactive\s+//g' "$file"
            # 确保导入了 ArgumentParser
            if ! grep -q "^import ArgumentParser" "$file"; then
              sed -i '' '1s;^;import ArgumentParser\n;'
            fi
            echo "Successfully patched $file"
          else
            echo "Error: AccessLevel+Resolution.swift not found."
            echo "Current directory structure:"
            ls -R | grep ":$" | sed -e 's/:$//' -e 's/[^-][^\/]*\//--/g' -e 's/^/  /' | head -n 50
            exit 1
          fi

      - name: Build Universal Binary
        run: |
          VERSION_CLEAN=${{ env.VERSION }}
          
          echo "Building version $VERSION_CLEAN (Build ${{ github.run_number }})"
          
          xcodebuild -scheme MDWriter \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath build \
            MARKETING_VERSION=$VERSION_CLEAN \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package App (ZIP and DMG)
        run: |
          # 确保清理旧产物
          rm -rf dmg_root deploy
          
          # 查找主程序，排除 Sparkle 的干扰
          APP_PATH=$(find build/Build/Products/Release -name "MDWriter.app" -type d | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "CRITICAL ERROR: MDWriter.app not found!"
            ls -R build/Build/Products/Release
            exit 1
          fi
          
          echo "Found app at: $APP_PATH"
          APP_NAME=$(basename "$APP_PATH")
          APP_DIR=$(dirname "$APP_PATH")
          
          VERSION_CLEAN=${{ env.VERSION }}
          
          ZIP_NAME="MDWriter-${VERSION_CLEAN}-Universal.zip"
          DMG_NAME="MDWriter-${VERSION_CLEAN}-Universal.dmg"
          
          # 打包 ZIP
          cd "$APP_DIR"
          zip -r "$GITHUB_WORKSPACE/$ZIP_NAME" "$APP_NAME"
          cd -
          
          # 打包 DMG
          mkdir -p dmg_root
          cp -R "$APP_PATH" dmg_root/
          hdiutil create -volname "MDWriter" -srcfolder dmg_root -ov -format UDZO "$DMG_NAME"
          
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          echo "DMG_NAME=$DMG_NAME" >> $GITHUB_ENV

      - name: Generate Sparkle Appcast
        env:
          RAW_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          # 1. 检查并清理私钥
          if [ -z "$RAW_PRIVATE_KEY" ]; then
            echo "ERROR: SPARKLE_PRIVATE_KEY secret is missing!"
            exit 1
          fi
          
          # 清理并导出
          CLEAN_KEY=$(echo "$RAW_PRIVATE_KEY" | tr -d '\n\r ' | sed 's/EdDSAPrivateKey://g')
          export SUPrivateEDKey="$CLEAN_KEY"
          
          # 调试：打印长度（安全）
          echo "Debug: Private key length is ${#CLEAN_KEY} characters."
          
          # 2. 下载并准备 Sparkle 环境
          curl -L -o sparkle.tar.xz https://github.com/sparkle-project/Sparkle/releases/download/2.8.1/Sparkle-2.8.1.tar.xz
          mkdir -p sparkle_tools
          tar -xf sparkle.tar.xz -C sparkle_tools
          
          # 3. 组织工具链结构
          cp sparkle_tools/bin/generate_appcast sparkle_tools/
          chmod +x sparkle_tools/generate_appcast
          
          # 4. 准备发布目录
          mkdir -p deploy
          cp "${{ env.ZIP_NAME }}" deploy/
          
          # 5. 生成 Appcast
          export DYLD_FRAMEWORK_PATH="$PWD/sparkle_tools:$DYLD_FRAMEWORK_PATH"
          
          echo "Running generate_appcast..."
          # 显式传递变量给命令
          SUPrivateEDKey="$SUPrivateEDKey" ./sparkle_tools/generate_appcast --download-url-prefix "https://github.com/lpgneg19/MDWriter/releases/download/${{ env.VERSION_TAG }}/" deploy/
          
          if [ -f "deploy/appcast.xml" ]; then
            mv deploy/appcast.xml .
            echo "Appcast generated successfully."
          else
            echo "ERROR: generate_appcast failed to produce appcast.xml. Check the private key format."
            exit 1
          fi

      - name: Extract Release Notes
        run: |
          VERSION_CLEAN=${{ env.VERSION }}
          # 提取日志，如果没有找到，则生成一个基础日志以免发布中断
          awk "/^## \[$VERSION_CLEAN\]/{flag=1;next} /^## \[/{flag=0} flag" CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "Release for version $VERSION_CLEAN. Check CHANGELOG.md for details." > release_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ZIP_NAME }}
            ${{ env.DMG_NAME }}
            appcast.xml
          name: Release ${{ env.VERSION_TAG }}
          tag_name: ${{ env.VERSION_TAG }}
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}