name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    name: Build Universal App
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Extract Version from Changelog
        id: get_version
        run: |
          # 提取最新的版本号 (匹配 ## [1.9.9] 格式)
          VERSION=$(sed -n '/## \[/p' CHANGELOG.md | head -n 1 | cut -d'[' -f2 | cut -d']' -f1)
          if [ -z "$VERSION" ]; then
            echo "Error: Could not extract version from CHANGELOG.md"
            head -n 20 CHANGELOG.md
            exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION_TAG=v$VERSION" >> $GITHUB_ENV
          echo "Detected Version: $VERSION"

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'
          
      - name: Resolve Swift Packages
        run: |
          # 显式创建目录并尝试解析依赖
          mkdir -p build
          xcodebuild -resolvePackageDependencies -project MDWriter.xcodeproj -scheme MDWriter -derivedDataPath build
          
      - name: Patch xcstrings-tool retroactive attribute
        run: |
          # 在整个工作区搜索文件，因为路径可能因 Xcode 版本或配置而异
          echo "Searching for AccessLevel+Resolution.swift..."
          file=$(find . -name "AccessLevel+Resolution.swift" | grep "xcstrings-tool" | head -n 1)
          
          if [ -n "$file" ] && [ -f "$file" ]; then
            echo "Found file at: $file"
            # 移除导致 Swift 6 编译错误的 @retroactive 属性
            perl -pi -e 's/\@retroactive\s+//g' "$file"
            # 确保导入了 ArgumentParser
            if ! grep -q "^import ArgumentParser" "$file"; then
              sed -i '' '1s;^;import ArgumentParser\n;'
            fi
            echo "Successfully patched $file"
          else
            echo "Error: AccessLevel+Resolution.swift not found."
            echo "Current directory structure:"
            ls -R | grep ":$" | sed -e 's/:$//' -e 's/[^-][^\/]*\//--/g' -e 's/^/  /' | head -n 50
            exit 1
          fi

      - name: Build Universal Binary
        run: |
          VERSION_CLEAN=${{ env.VERSION }}
          
          echo "Building version $VERSION_CLEAN (Build ${{ github.run_number }})"
          
          xcodebuild -scheme MDWriter \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath build \
            MARKETING_VERSION=$VERSION_CLEAN \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package App (ZIP and DMG)
        run: |
          # 确保清理旧产物
          rm -rf dmg_root deploy
          
          # 查找主程序，排除 Sparkle 的干扰
          APP_PATH=$(find build/Build/Products/Release -name "MDWriter.app" -type d | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "CRITICAL ERROR: MDWriter.app not found!"
            ls -R build/Build/Products/Release
            exit 1
          fi
          
          echo "Found app at: $APP_PATH"
          APP_NAME=$(basename "$APP_PATH")
          APP_DIR=$(dirname "$APP_PATH")
          
          VERSION_CLEAN=${{ env.VERSION }}
          
          ZIP_NAME="MDWriter-${VERSION_CLEAN}-Universal.zip"
          DMG_NAME="MDWriter-${VERSION_CLEAN}-Universal.dmg"
          
          # 打包 ZIP
          cd "$APP_DIR"
          zip -r "$GITHUB_WORKSPACE/$ZIP_NAME" "$APP_NAME"
          cd -
          
          # 打包 DMG
          mkdir -p dmg_root
          cp -R "$APP_PATH" dmg_root/
          hdiutil create -volname "MDWriter" -srcfolder dmg_root -ov -format UDZO "$DMG_NAME"
          
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          echo "DMG_NAME=$DMG_NAME" >> $GITHUB_ENV

      - name: Generate Sparkle Appcast (import private key into temp keychain)
        env:
          RAW_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${RAW_PRIVATE_KEY:-}" ]; then
            echo "ERROR: SPARKLE_PRIVATE_KEY secret is missing!"
            exit 1
          fi

          # 写出私钥文件：推荐在仓库 Secret 中保存真实换行的 PEM 内容（-----BEGIN PRIVATE KEY-----...-----END PRIVATE KEY-----）
          # 如果你的 secret 为单行且使用 \n 表示换行，请把 \n 替换成真正的换行
          echo "Preparing private key file..."
          # 尝试把文字中的 \n 转换为换行（兼容两种存储方式）
          printf "%b" "$RAW_PRIVATE_KEY" > spark_private.pem
          chmod 600 spark_private.pem
          echo "Private key written to spark_private.pem (kept in runner workspace only)."

          # 创建临时 keychain 并导入私钥（以便 generate_appcast 从 Keychain 查找）
          KEYCHAIN_NAME="sparkle-temp.keychain"
          KEYCHAIN_PASS=$(echo $RANDOM | md5sum | cut -c1-20 || echo "passw0rd123456789") # 简单随机口令
          echo "Creating temporary keychain..."
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_NAME"
          # 将新 keychain 加入到 keychain 搜索路径
          security list-keychains -s "$KEYCHAIN_NAME" $(security list-keychains | sed -n '1p' | tr -d ' "') || true
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_NAME"
          # 导入私钥（假设 PEM 格式且无密码）。若私钥有密码，请提供 -P "password"
          echo "Importing private key into keychain..."
          security import spark_private.pem -k "$KEYCHAIN_NAME" -P "" -T /usr/bin/codesign -T /usr/bin/security || true

          # 允许工具访问此 key（避免交互提示）
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN_NAME" || true

          # 下载并准备 Sparkle 工具（如原 workflow）
          curl -L -o sparkle.tar.xz https://github.com/sparkle-project/Sparkle/releases/download/2.8.1/Sparkle-2.8.1.tar.xz
          mkdir -p sparkle_tools
          tar -xf sparkle.tar.xz -C sparkle_tools
          cp sparkle_tools/bin/generate_appcast sparkle_tools/
          chmod +x sparkle_tools/generate_appcast

          mkdir -p deploy
          cp "${{ env.ZIP_NAME }}" deploy/

          # 设置 DYLD_FRAMEWORK_PATH 供 generate_appcast 找到 Sparkle.framework
          export DYLD_FRAMEWORK_PATH="$PWD/sparkle_tools:$DYLD_FRAMEWORK_PATH"
          echo "Running generate_appcast..."
          ./sparkle_tools/generate_appcast --download-url-prefix "https://github.com/lpgneg19/MDWriter/releases/download/${{ github.ref_name }}/" deploy/ || true

          # 检查输出
          if [ -f "deploy/appcast.xml" ]; then
            mv deploy/appcast.xml .
            echo "Appcast generated successfully."
          else
            echo "ERROR: generate_appcast failed to produce appcast.xml."
            echo "Check that the private key format is a PEM PKCS8 Ed25519 key and that it was imported into the keychain."
            # 导出 keychain 列表以便调试
            security list-keychains
            security find-identity -v -p codesigning || true
            # 打印 generate_appcast stderr/stdout 已经由 action 显示
            exit 1
          fi

          # 清理：删除临时 keychain & 私钥文件
          echo "Cleaning up temporary keychain..."
          security delete-keychain "$KEYCHAIN_NAME" || true
          shred -u spark_private.pem || rm -f spark_private.pem || true
          
      - name: Extract Release Notes
        run: |
          VERSION_CLEAN=${{ env.VERSION }}
          # 提取日志，如果没有找到，则生成一个基础日志以免发布中断
          awk "/^## \[$VERSION_CLEAN\]/{flag=1;next} /^## \[/{flag=0} flag" CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "Release for version $VERSION_CLEAN. Check CHANGELOG.md for details." > release_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ZIP_NAME }}
            ${{ env.DMG_NAME }}
            appcast.xml
          name: Release ${{ env.VERSION_TAG }}
          tag_name: ${{ env.VERSION_TAG }}
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}