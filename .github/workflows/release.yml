name: Build and Release

on:
  push:
    tags:
      - 'v*' # 当推送以 v 开头的标签时触发，例如 v1.1

jobs:
  build:
    name: Build Universal App
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Build Universal Binary
        run: |
          xcodebuild -scheme MDWriter \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath build \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package App (ZIP and DMG)
        run: |
          # 找到编译好的 .app 文件
          APP_PATH=$(find build/Build/Products/Release -name "*.app" -type d | head -n 1)
          APP_NAME=$(basename "$APP_PATH")
          APP_DIR=$(dirname "$APP_PATH")
          
          VERSION=${{ github.ref_name }}
          # 去掉前面的 v 如果存在
          VERSION_CLEAN=${VERSION#v}
          
          ZIP_NAME="MDWriter-${VERSION_CLEAN}-Universal.zip"
          DMG_NAME="MDWriter-${VERSION_CLEAN}-Universal.dmg"
          
          # 打包 ZIP
          cd "$APP_DIR"
          zip -r "$GITHUB_WORKSPACE/$ZIP_NAME" "$APP_NAME"
          cd -
          
          # 打包 DMG
          # 创建一个临时目录放 app
          mkdir -p dmg_root
          cp -R "$APP_PATH" dmg_root/
          
          hdiutil create -volname "MDWriter" -srcfolder dmg_root -ov -format UDZO "$DMG_NAME"
          
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          echo "DMG_NAME=$DMG_NAME" >> $GITHUB_ENV

      - name: Package with Sparkle
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          # 1. Download Sparkle Tools
          curl -L -O https://github.com/sparkle-project/Sparkle/releases/download/2.6.4/Sparkle-2.6.4.tar.xz
          tar -xf Sparkle-2.6.4.tar.xz

          # 2. Prepare Directory for Appcast
          mkdir -p sparkle_output
          cp "$ZIP_NAME" sparkle_output/
          
          # 3. Define Download URL Prefix (Points to this GitHub Release)
          DOWNLOAD_URL_PREFIX="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/"
          
          # 4. Generate Appcast and Sign
          if [ -n "$SPARKLE_PRIVATE_KEY" ]; then
            echo "Sparkle private key found. Signing update..."
            ./bin/generate_appcast sparkle_output/ \
              --download-url-prefix "$DOWNLOAD_URL_PREFIX" \
              --ed-key-file <(echo "$SPARKLE_PRIVATE_KEY")
              
            mv sparkle_output/appcast.xml .
            echo "HAS_APPCAST=true" >> $GITHUB_ENV
          else
            echo "Warning: SPARKLE_PRIVATE_KEY not found in Secrets. Skipping Sparkle signature."
            echo "HAS_APPCAST=false" >> $GITHUB_ENV
          fi

      - name: Extract Release Notes
        run: |
          VERSION=${{ github.ref_name }}
          VERSION_CLEAN=${VERSION#v}
          # Extract content between current version header and next version header
          awk "/^## \[$VERSION_CLEAN\]/{flag=1;next} /^## \[/{flag=0} flag" CHANGELOG.md > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ZIP_NAME }}
            ${{ env.DMG_NAME }}
          name: Release ${{ github.ref_name }}
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
