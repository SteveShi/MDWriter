name: MDWriter

options:
  bundleIdPrefix: listentotherain
  deploymentTarget:
    macOS: "14.0"

settings:
  MARKETING_VERSION: 2.3.1
  CURRENT_PROJECT_VERSION: 231
  SWIFT_VERSION: 6.0

packages:
  MDEditor:
    url: https://github.com/SteveShi/MDEditor.git
    from: 1.6.2
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.1
  WhatsNewKit:
    url: https://github.com/SvenTiigi/WhatsNewKit
    from: 2.2.1
targets:
  MDWriter:
    type: application
    platform: macOS
    sources:
      - path: MDWriter
    resources:
      - path: MDWriter/Assets.xcassets
      - path: MDWriter/Resources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: listentotherain.MDWriter
      INFOPLIST_FILE: MDWriter/App/Info.plist
      ENABLE_APP_SANDBOX: NO
      GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - package: MDEditor
        product: MDEditor
      - package: Sparkle
        product: Sparkle
      - package: WhatsNewKit
        product: WhatsNewKit

schemes:
  MDWriter:
    build:
      targets:
        MDWriter: all
