name: MDWriter

options:
  bundleIdPrefix: listentotherain
  deploymentTarget:
    macOS: "14.0"

settings:
  MARKETING_VERSION: 2.6.0
  CURRENT_PROJECT_VERSION: 260
  SWIFT_VERSION: 6.0

packages:
  MDEditorKit:
    url: https://github.com/SteveShi/MDEditorKit.git
    from: 2.0.0
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.2
  WhatsNewKit:
    url: https://github.com/SvenTiigi/WhatsNewKit
    from: 2.2.1
targets:
  MDWriter:
    type: application
    platform: macOS
    sources:
      - path: MDWriter
    resources:
      - path: MDWriter/Assets.xcassets
      - path: MDWriter/Resources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: listentotherain.MDWriter
      INFOPLIST_FILE: MDWriter/App/Info.plist
      ENABLE_APP_SANDBOX: NO
      GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - package: MDEditorKit
        product: MDEditorKit
      - package: Sparkle
        product: Sparkle
      - package: WhatsNewKit
        product: WhatsNewKit

schemes:
  MDWriter:
    build:
      targets:
        MDWriter: all
