<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- macOS Squircle Background -->
  <rect x="50" y="50" width="924" height="924" rx="200" fill="url(#bg_gradient)" stroke="#E0E0E0" stroke-width="2"/>
  
  <!-- Paper Stack Effect -->
  <rect x="150" y="150" width="724" height="724" rx="20" fill="#FDFBF7" fill-opacity="0.9" filter="url(#dropShadow)"/>
  <rect x="150" y="150" width="724" height="724" rx="20" fill="url(#paper_texture)" fill-opacity="0.1"/>

  <!-- Stylized Pen / Markdown Symbol -->
  <g transform="translate(512, 512) scale(1.2)">
    <!-- Pen Nib Shape -->
    <path d="M-120 -180 C -120 -250, 0 -300, 0 -300 C 0 -300, 120 -250, 120 -180 C 120 0, 0 200, 0 200 C 0 200, -120 0, -120 -180 Z" fill="url(#metal_gradient)"/>
    <!-- Center Slit -->
    <path d="M0 -220 L0 100" stroke="#333" stroke-width="8" stroke-linecap="round"/>
    <!-- Breathe Hole -->
    <circle cx="0" cy="-140" r="15" fill="#FDFBF7" stroke="#333" stroke-width="4"/>
    
    <!-- Markdown 'M' woven into the pen design (Abstract) -->
    <path d="M-160 100 L-160 -50 L0 50 L160 -50 L160 100" stroke="#FF9500" stroke-width="30" stroke-linecap="round" stroke-linejoin="round" fill="none" transform="translate(0, 100)"/>
  </g>

  <!-- Gradients & Filters -->
  <defs>
    <linearGradient id="bg_gradient" x1="50" y1="50" x2="974" y2="974" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAFAFA"/>
      <stop offset="1" stop-color="#E0E0E0"/>
    </linearGradient>
    <linearGradient id="metal_gradient" x1="-100" y1="-200" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#555"/>
      <stop offset="0.5" stop-color="#999"/>
      <stop offset="1" stop-color="#333"/>
    </linearGradient>
    <filter id="dropShadow" x="100" y="100" width="824" height="824" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-opacity="0.15"/>
    </filter>
    <pattern id="paper_texture" patternUnits="userSpaceOnUse" width="100" height="100">
       <rect width="100" height="100" fill="#fff"/>
       <!-- Simple noise simulation could go here -->
    </pattern>
  </defs>
</svg>
